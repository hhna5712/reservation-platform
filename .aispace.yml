# Cafe24 AI Space 배포 설정
runtime: nodejs(20)
name: reservation-platform

# 빌드 설정
build:
  command: npm install && npm run build

# 실행 설정
start:
  command: npm start
  port: 3000

# 환경변수 (배포 후 AI Space 콘솔에서 설정 필요)
# DATABASE_URL: PostgreSQL 연결 문자열
# JWT_SECRET: JWT 시크릿 키
# NEXT_PUBLIC_APP_URL: 앱 URL

# 데이터베이스 옵션
# PostgreSQL 필요
options:
  - database: postgresql
